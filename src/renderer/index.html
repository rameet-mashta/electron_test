<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>electron_test</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <link href="./assets/main.css" type="text/css" rel="stylesheet" />
  </head>

  <body>
    <div id="app">
      <header class="app-header">
        <h1 class="app-name">electron_test</h1>
        <span class="app-version"></span>
      </header>

      <section class="update-panel">
        <div class="update-row">
          <span class="update-icon" aria-hidden="true">&#x27F3;</span>
          <span class="update-message">Checking for updates…</span>
        </div>
        <div class="update-progress" hidden>
          <div class="update-bar"><div class="update-fill"></div></div>
          <span class="update-percent"></span>
        </div>
      </section>

      <section class="db-section">
        <h2>Key / Value Store</h2>
        <div class="db-row">
          <input id="db-key" type="text" placeholder="Key" />
          <input id="db-value" type="text" placeholder="Value" />
          <button id="db-set">Set</button>
          <button id="db-get">Get</button>
        </div>
        <p id="db-result" class="db-result"></p>
      </section>
    </div>

    <script type="module" src="./src/renderer.ts"></script>
  </body>
</html>
